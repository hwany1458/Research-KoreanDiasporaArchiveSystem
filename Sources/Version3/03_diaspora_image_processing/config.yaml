# =============================================================
# Diaspora Image Restoration Pipeline — Configuration Example
# =============================================================
# 이 파일은 파이프라인의 모든 옵션 예시를 보여줍니다.
# 실제 사용 시 필요한 부분만 남기고 나머지는 삭제해도 됩니다.
# 모든 키는 ProcessingOptions의 default 값과 동일합니다.
#
# 사용법:
#   python -m src.pipeline --config config.yaml \
#       --input data/input/photo.jpg \
#       --output data/output/photo_restored.jpg
# =============================================================

# -------------------------------------------------------------
# 초해상도 (Real-ESRGAN x4plus)
# -------------------------------------------------------------
super_resolution:
  enabled: true
  scale: 4              # 4 또는 2 (RealESRGAN_x2plus.pth가 있을 때만 2 가능)
  
  # 자동 트리거 조건 (conditional_execution=true일 때만 작동)
  auto_trigger:
    min_resolution: 512   # 짧은 변이 이 값보다 작으면 SR 적용
    max_resolution: 2048  # 긴 변이 이 값보다 크면 SR 스킵 (이미 충분히 큼)

# -------------------------------------------------------------
# 얼굴 향상 (GFPGAN v1.4)
# -------------------------------------------------------------
face_enhancement:
  enabled: true
  upscale: 2            # GFPGAN 자체 업스케일 배율
  
  # ※ 8GB VRAM 노트북 호환성을 위한 필수 옵션
  # 입력 최대 변 크기 — 이를 초과하면 다운스케일 후 GFPGAN 적용
  # GFPGAN은 어차피 검출 얼굴을 512x512로 정렬하므로 검출 입력
  # 해상도가 복원 품질에 영향을 미치지 않음.
  # 1536: 8GB 권장 / null: 무제한 (16GB+ GPU)
  # max_input_dim: 1536    # ※ 현재 face_enhancement.py default가 1536

# -------------------------------------------------------------
# 컬러화 (DDColor 주 모델 + DeOldify/Sepia fallback)
# -------------------------------------------------------------
colorization:
  enabled: true
  model_type: "artistic"   # DeOldify용: "artistic" 또는 "stable"
  render_factor: 35         # DeOldify용: 7~45 (높을수록 정밀)
  # backend: null            # null=자동 / "ddcolor" / "deoldify" / "sepia"
  
  # ※ 8GB VRAM + 색상 cast 완화를 위한 필수 옵션
  # DDColor 입력 최대 변 — 이를 초과하면 다운스케일 후 컬러화
  # 결과는 LAB 공간에서 ab(색상) 채널만 추출 → 원본 해상도로
  # 업스케일 → 원본 L(휘도) 채널과 합성 (디테일 무손실)
  # max_input_dim: 1536    # ※ 현재 colorization.py default가 1536

# -------------------------------------------------------------
# 이미지 분석 (BLIP-large + CLIP-large + face_recognition)
# -------------------------------------------------------------
image_analysis:
  captioning:
    enabled: true           # BLIP 캡션 생성
  scene_classification:
    enabled: true           # CLIP 20개 한국 카테고리 분류
  face_detection:
    enabled: true           # face_recognition 얼굴 인코딩

# -------------------------------------------------------------
# 파이프라인 동작 옵션
# -------------------------------------------------------------
pipeline:
  # 단계 자동 트리거 활성화 (false면 모든 단계를 강제 실행)
  conditional_execution: true
  
  # 단계별 중간 결과 jpg 저장
  # data/output/<output_stem>_stages/01_*.jpg, 02_*.jpg, ... 와
  # _pipeline_order.txt가 생성됨
  save_intermediate: false
  
  # ※ 8GB VRAM 노트북에서는 반드시 true
  # true: 단계 종료 후 모듈 가중치를 GPU에서 언로드 → 다음 단계 OOM 방지
  # false: 모듈 GPU 상주 → 배치 처리 시 모델 재로드 시간 절약
  low_vram_mode: false
  
  # 단계별 VRAM 사용량을 stdout에 출력 (디버깅·실험 측정용)
  vram_verbose: false
  
  # ※ 단계 실행 순서 (ablation 실험용)
  # 가능한 단계명 (별칭 지원):
  #   - "super_resolution" / "sr"
  #   - "face_enhancement" / "face"
  #   - "colorization" / "color" / "colorize"
  # analysis는 항상 마지막에 실행되므로 이 리스트에 포함 X
  #
  # default: ["super_resolution", "face_enhancement", "colorization"]
  # 권장 (실험 결과 색상·얼굴 균형이 가장 좋음):
  #   pipeline_order: ["color", "sr", "face"]
  #
  # 5가지 ablation 후보:
  #   - ["sr", "face", "color"]    # default
  #   - ["color", "face", "sr"]    # 옵션 B (1200x844 결과 가장 자연스러움)
  #   - ["sr", "color", "face"]    # 옵션 D
  #   - ["color", "sr", "face"]    # 옵션 E (4800x3376 권장)
  #   - ["face", "color", "sr"]    # 옵션 C
  # pipeline_order: ["super_resolution", "face_enhancement", "colorization"]

# -------------------------------------------------------------
# (선택) SR 타일 크기 — 메모리 단편화 회피용
# -------------------------------------------------------------
# sr_tile_size: null      # null=자동 (low_vram=128, 일반=256)
                          # 0=분할 없음 (가장 빠름, 16GB+ GPU 권장)
                          # 128, 256, 512 등 지정 가능
